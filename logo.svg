  <circle cx="18" cy="30" r="3.4" fill="#F6B26B"/>
  <circle cx="33" cy="40" r="2.6" fill="#F6B26B" opacity="0.72"/>
  <circle cx="48" cy="47" r="1.9" fill="#F6B26B" opacity="0.45"/>
  <!-- baseline -->
