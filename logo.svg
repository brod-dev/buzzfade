<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="buzzfade logo">
  <defs>
    <linearGradient id="bf-g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6B26B"/>
      <stop offset="1" stop-color="#C2703A"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="#241C17"/>
  <!-- decaying curve -->
  <path d="M10 20 C22 20 22 44 34 46 C44 47.6 50 48 54 48" stroke="url(#bf-g)" stroke-width="4" stroke-linecap="round" fill="none"/>
